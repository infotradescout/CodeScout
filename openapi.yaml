openapi: 3.1.0
info:
  title: CodeScout Jurisdictional Code Mutation API
  version: 1.0.0
  summary: Simulated append-only mutation handling contract for municipal code publication workflows.
servers:
  - url: https://api.codescout.example
paths:
  /api/v1/jurisdictions/{jurisdictionId}/code-mutations:
    post:
      operationId: submitJurisdictionalCodeMutation
      summary: Submit a jurisdictional code mutation event for append-only processing.
      security:
        - bearerAuth: []
      parameters:
        - name: jurisdictionId
          in: path
          required: true
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JurisdictionalCodeMutationRequest"
      responses:
        "202":
          description: Mutation accepted for append-only processing and projection rebuild.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedMutationResponse"
        "400":
          description: Request failed schema or business validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationFailureResponse"
        "401":
          description: Missing or invalid authenticated subject in the simulated handler input.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "403":
          description: Authenticated subject is not permitted to submit for the target jurisdiction.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "409":
          description: Conflict with idempotency key or append-only event identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictResponse"
        "422":
          description: Payload is syntactically valid but cannot be applied to the referenced provision state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseProvisionNotFoundResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AmendmentAction:
      type: string
      enum:
        - INHERIT_BASE
        - AMEND
        - DELETE
    EventStatus:
      type: string
      enum:
        - SUBMITTED
        - APPROVED
        - REJECTED
        - SUPERSEDED
    AuditSource:
      type: string
      enum:
        - PORTAL
        - API
    EffectiveProvisionStatus:
      type: string
      enum:
        - BASE_CODE
        - LOCALLY_AMENDED
        - LOCALLY_DELETED
    SubmittedBy:
      type: object
      additionalProperties: false
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        subjectId:
          type: string
    CompiledCodePayloadMetadata:
      type: object
      additionalProperties: false
      required:
        - generatedAt
        - disclaimer
        - computedStatus
        - jurisdictionId
        - provisionId
      properties:
        generatedAt:
          type: string
          format: date-time
        disclaimer:
          type: string
        computedStatus:
          $ref: "#/components/schemas/EffectiveProvisionStatus"
        jurisdictionId:
          type: string
        provisionId:
          type: string
    ResponseMetadata:
      type: object
      additionalProperties: false
      required:
        - generatedAt
        - disclaimer
      properties:
        generatedAt:
          type: string
          format: date-time
        disclaimer:
          type: string
    JurisdictionalCodeMutationRequest:
      type: object
      additionalProperties: false
      required:
        - mutationType
        - jurisdictionId
        - codeFamily
        - codeYear
        - sectionNumber
        - action
        - sourceSystem
        - externalMutationId
        - submittedBy
      properties:
        mutationType:
          type: string
          const: JURISDICTIONAL_CODE_MUTATION
        jurisdictionId:
          type: string
        codeFamily:
          type: string
        codeYear:
          type: string
        sectionNumber:
          type: string
        action:
          $ref: "#/components/schemas/AmendmentAction"
        amendedText:
          type: string
        ordinanceReference:
          type: string
        effectiveDate:
          type: string
          format: date
        sourceSystem:
          type: string
        externalMutationId:
          type: string
        source:
          $ref: "#/components/schemas/AuditSource"
        sourceDocumentUrl:
          type: string
          format: uri
        supersedesEventId:
          type: string
        submittedBy:
          $ref: "#/components/schemas/SubmittedBy"
    ComputedEffectiveProvision:
      type: object
      additionalProperties: false
      required:
        - jurisdictionId
        - provisionId
        - codeFamily
        - codeYear
        - sectionNumber
        - title
        - baseText
        - amendedText
        - displayText
        - status
        - ordinanceReference
        - effectiveDate
        - eventId
        - previousHash
        - payloadHash
        - metadata
      properties:
        jurisdictionId:
          type: string
        provisionId:
          type: string
        codeFamily:
          type: string
        codeYear:
          type: string
        sectionNumber:
          type: string
        title:
          type: string
        baseText:
          type: string
        amendedText:
          type:
            - string
            - "null"
        displayText:
          type:
            - string
            - "null"
        status:
          $ref: "#/components/schemas/EffectiveProvisionStatus"
        ordinanceReference:
          type:
            - string
            - "null"
        effectiveDate:
          type:
            - string
            - "null"
        eventId:
          type:
            - string
            - "null"
        previousHash:
          type:
            - string
            - "null"
        payloadHash:
          type:
            - string
            - "null"
        metadata:
          $ref: "#/components/schemas/CompiledCodePayloadMetadata"
    ProjectionRecord:
      type: object
      additionalProperties: false
      required:
        - jurisdictionId
        - provisionId
        - compiledProvision
      properties:
        jurisdictionId:
          type: string
        provisionId:
          type: string
        asOfDate:
          type: string
          format: date
        compiledProvision:
          $ref: "#/components/schemas/ComputedEffectiveProvision"
    AcceptedMutationResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - mutationId
        - jurisdictionAmendmentEventId
        - auditEventId
        - computedEffectiveStatus
        - projection
        - metadata
      properties:
        status:
          type: string
          const: ACCEPTED
        mutationId:
          type: string
        jurisdictionAmendmentEventId:
          type: string
        auditEventId:
          type: string
        computedEffectiveStatus:
          $ref: "#/components/schemas/EffectiveProvisionStatus"
        projection:
          $ref: "#/components/schemas/ProjectionRecord"
        metadata:
          $ref: "#/components/schemas/ResponseMetadata"
    ErrorDetail:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - VALIDATION_FAILED
            - UNAUTHENTICATED
            - FORBIDDEN
            - CONFLICT
            - BASE_PROVISION_NOT_FOUND
        message:
          type: string
        issues:
          type: array
          items:
            type: string
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - error
        - metadata
      properties:
        status:
          type: string
          const: REJECTED
        error:
          $ref: "#/components/schemas/ErrorDetail"
        failedMutationAttemptId:
          type: string
        metadata:
          $ref: "#/components/schemas/ResponseMetadata"
    ValidationFailureResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              allOf:
                - $ref: "#/components/schemas/ErrorDetail"
                - type: object
                  properties:
                    code:
                      type: string
                      const: VALIDATION_FAILED
    UnauthorizedResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              allOf:
                - $ref: "#/components/schemas/ErrorDetail"
                - type: object
                  properties:
                    code:
                      type: string
                      const: UNAUTHENTICATED
    ForbiddenResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              allOf:
                - $ref: "#/components/schemas/ErrorDetail"
                - type: object
                  properties:
                    code:
                      type: string
                      const: FORBIDDEN
    ConflictResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              allOf:
                - $ref: "#/components/schemas/ErrorDetail"
                - type: object
                  properties:
                    code:
                      type: string
                      const: CONFLICT
    BaseProvisionNotFoundResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              allOf:
                - $ref: "#/components/schemas/ErrorDetail"
                - type: object
                  properties:
                    code:
                      type: string
                      const: BASE_PROVISION_NOT_FOUND
